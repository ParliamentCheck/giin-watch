name: 日次データ収集

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      skip_keywords:
        description: "キーワード更新をスキップする"
        type: boolean
        default: false

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  PYTHONPATH: apps/collector
  SKIP_KEYWORDS: ${{ inputs.skip_keywords }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r apps/collector/requirements.txt
          sudo apt-get update && sudo apt-get install -y mecab libmecab-dev

      - name: 議員データ登録
        id: members
        continue-on-error: true
        run: python apps/collector/sources/members.py

      - name: 発言データ収集
        id: speeches
        continue-on-error: true
        run: python apps/collector/sources/speeches.py

      - name: 活動スコア再計算
        id: scoring
        continue-on-error: true
        run: python apps/collector/processors/scoring.py

      - name: 内閣役職データ取得
        id: cabinet
        continue-on-error: true
        run: python apps/collector/sources/cabinet_scraper.py

      - name: 質問主意書収集
        id: questions
        continue-on-error: true
        run: python apps/collector/sources/questions.py

      - name: 請願収集
        id: petitions
        continue-on-error: true
        run: python apps/collector/sources/petitions.py

      - name: 採決記録収集（現会期）
        id: votes
        continue-on-error: true
        timeout-minutes: 10
        run: python apps/collector/sources/votes.py --mode daily

      - name: 議員立法・閣法収集（日次）
        id: bills
        continue-on-error: true
        timeout-minutes: 30
        run: python apps/collector/sources/bills.py --daily

      - name: 委員会所属収集
        id: committees
        continue-on-error: true
        timeout-minutes: 15
        run: python apps/collector/sources/committees.py

      - name: キーワード更新
        id: keywords
        if: inputs.skip_keywords != true
        continue-on-error: true
        timeout-minutes: 20
        run: python apps/collector/sources/keywords.py --mode daily

      - name: 実行結果サマリー
        if: always()
        run: |
          echo "## 実行結果"
          echo "| ステップ | 結果 |"
          echo "|---------|------|"
          echo "| 議員データ登録 | ${{ steps.members.outcome }} |"
          echo "| 発言データ収集 | ${{ steps.speeches.outcome }} |"
          echo "| スコア再計算 | ${{ steps.scoring.outcome }} |"
          echo "| 内閣役職 | ${{ steps.cabinet.outcome }} |"
          echo "| 質問主意書 | ${{ steps.questions.outcome }} |"
          echo "| 請願収集 | ${{ steps.petitions.outcome }} |"
          echo "| 採決記録 | ${{ steps.votes.outcome }} |"
          echo "| 議員立法・閣法 | ${{ steps.bills.outcome }} |"
          echo "| 委員会所属 | ${{ steps.committees.outcome }} |"
          echo "| キーワード更新 | ${{ steps.keywords.outcome }} |"

      - name: speeches 上限チェック・削除
        id: cleanup
        continue-on-error: true
        run: python apps/collector/processors/cleanup.py --task truncate-speeches

      - name: データ品質監査
        id: audit
        continue-on-error: true
        timeout-minutes: 10
        run: python apps/collector/processors/audit.py --output /tmp/audit_report.md

      - name: 監査エラーをIssueに報告
        if: steps.audit.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "データ品質監査: 不整合を検出 $(date +%Y-%m-%d)" \
            --body "$(cat /tmp/audit_report.md)"

      - name: 失敗チェック
        if: always()
        run: |
          if [ "${{ steps.members.outcome }}" = "failure" ] || \
             [ "${{ steps.speeches.outcome }}" = "failure" ] || \
             [ "${{ steps.scoring.outcome }}" = "failure" ]; then
            echo "::warning::1つ以上のステップが失敗しました"
          fi
