name: 過去データ一括取得

on:
  workflow_dispatch:
    inputs:
      task:
        description: "実行タスク"
        type: choice
        required: true
        options:
          - "migrate-member-ids"
          - "scoring-only"
          - "speeches-all"
          - "speeches-2024"
          - "speeches-2023"
          - "speeches-2022"
          - "speeches-2021"
          - "speeches-2018-2020"
          - "keyword-all"
          - "keyword-full-rebuild"
          - "backfill-procedural"
          - "votes-collect"
          - "bills-collect"
          - "sangiin-questions"
          - "petitions-collect"

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  PYTHONPATH: apps/collector

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r apps/collector/requirements.txt
          sudo apt-get update && sudo apt-get install -y mecab libmecab-dev

      - name: バックフィル実行
        run: python apps/collector/run_backfill.py --task ${{ inputs.task }}
