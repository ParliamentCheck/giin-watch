name: 過去データ一括取得

on:
  workflow_dispatch:
    inputs:
      task:
        description: "実行タスク"
        type: choice
        required: true
        options:
          - "migrate-member-ids"
          - "scoring-only"
          - "speeches-all"
          - "speeches-2024"
          - "speeches-2023"
          - "speeches-2022"
          - "speeches-2021"
          - "speeches-2018-2020"
          - "keyword-full-rebuild"
          - "backfill-procedural"
          - "votes-collect"
          - "bills-collect"
          - "sangiin-questions"

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  PYTHONPATH: apps/collector

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r apps/collector/requirements.txt
          sudo apt-get update && sudo apt-get install -y mecab libmecab-dev

      - name: member ID マイグレーション
        if: inputs.task == 'migrate-member-ids'
        run: python scripts/migrate_member_ids.py

      - name: スコアのみ再計算
        if: inputs.task == 'scoring-only'
        run: python apps/collector/run_scoring.py

      - name: 発言データ過去取得
        if: startsWith(inputs.task, 'speeches-')
        run: |
          run_year() {
            local from=$1 until=$2
            echo "=== $from 〜 $until ==="
            export NDL_DATE_FROM="$from"
            export NDL_DATE_UNTIL="$until"
            python apps/collector/sources/ndl_api.py
            python apps/collector/run_scoring.py
            python scripts/cleanup.py --task truncate-speeches || true
          }

          case "${{ inputs.task }}" in
            "speeches-all")
              run_year "2021-01-01" "2021-12-31"
              run_year "2022-01-01" "2022-12-31"
              run_year "2023-01-01" "2023-12-31"
              run_year "2024-01-01" "2024-12-31"
              ;;
            "speeches-2024")
              run_year "2024-01-01" "2024-12-31"
              ;;
            "speeches-2023")
              run_year "2023-01-01" "2023-12-31"
              ;;
            "speeches-2022")
              run_year "2022-01-01" "2022-12-31"
              ;;
            "speeches-2021")
              run_year "2021-01-01" "2021-12-31"
              ;;
            "speeches-2018-2020")
              run_year "2018-01-01" "2020-12-31"
              ;;
          esac

      - name: キーワード全件再構築
        if: inputs.task == 'keyword-full-rebuild'
        timeout-minutes: 300
        run: python apps/collector/sources/keyword_builder.py --mode full --years 4

      - name: is_procedural バックフィル
        if: inputs.task == 'backfill-procedural'
        run: python scripts/backfill_procedural.py

      - name: 採決記録収集
        if: inputs.task == 'votes-collect'
        run: python apps/collector/sources/vote_scraper.py

      - name: 議員立法収集
        if: inputs.task == 'bills-collect'
        run: python apps/collector/sources/bill_scraper.py

      - name: 参議院質問主意書
        if: inputs.task == 'sangiin-questions'
        run: python apps/collector/sources/sangiin_shitsumon.py

      - name: スコア再計算（speeches-all / scoring-only 以外）
        if: always() && !startsWith(inputs.task, 'speeches-') && inputs.task != 'scoring-only' && inputs.task != 'migrate-member-ids'
        run: python apps/collector/run_scoring.py

      - name: スコア再計算（migrate 後）
        if: inputs.task == 'migrate-member-ids'
        run: python apps/collector/run_scoring.py
